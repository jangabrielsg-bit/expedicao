<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque e Expedição Câmaras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#fff3d6', 100: '#fdeeb5', 200: '#fade87', 300: '#f8c959', 400: '#f6b915', 500: '#f5b915', 600: '#d9a20d', 800: '#a67a06' }, brown: { 50: '#fdfbfa', 100: '#f7f2ed', 200: '#eadecf', 300: '#d9c6af', 400: '#c5ab8d', 500: '#a78355', 600: '#8c683f', 800: '#6b4423', 900: '#4a2f18', 950: '#3a2410' }, gray: { 50: '#fdfbfa', 100: '#f7f2ed', 200: '#eadecf', 300: '#d9c6af', 400: '#c5ab8d', 500: '#a78355', 600: '#8c683f', 800: '#6b4423', 900: '#4a2f18' } } } } }
    </script>
    <style>
        body { background-color: #ffffff; }
        .sidebar-active { background-color: #fff3d6; color: #6b4423; border-right: 4px solid #f5b915; font-weight: 800; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d9c6af; border-radius: 3px; }
        .modal-overlay { backdrop-filter: blur(4px); }
        @media print {
            body { background-color: white !important; }
            aside, header, #toast, .modal-overlay, .no-print { display: none !important; }
            main, #main-container { overflow: visible !important; height: auto !important; padding: 0 !important; }
            #view-inventario, #print-area { display: block !important; position: static !important; width: 100%; box-shadow: none !important; border: none !important; margin-top: 0 !important;}
            #inv-selection-area, #inv-lancamento-area { display: none !important; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800 font-sans">

    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <i class="ph ph-spinner-gap animate-spin text-4xl text-brand-500 mb-4"></i>
        <p class="text-gray-500 font-medium">Conectando ao banco de dados...</p>
    </div>

    <div id="app-container" class="hidden flex-1 flex h-screen overflow-hidden w-full relative">
        <aside id="sidebar" class="w-64 bg-white border-r border-gray-100 flex flex-col shadow-sm z-30 shrink-0 relative transition duration-200">
            <div class="h-16 flex items-center px-6 border-b border-gray-100">
                <i class="ph-fill ph-snowflake text-brand-500 text-2xl mr-2"></i>
                <h1 class="text-lg font-bold text-gray-900">Expedição Câmaras</h1>
            </div>
            <nav class="flex-1 py-4 space-y-1 overflow-y-auto">
                <button onclick="window.navigate('dashboard')" id="nav-dashboard" class="sidebar-active w-full flex items-center px-6 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="ph ph-squares-four text-lg mr-3"></i> Painel Inicial
                </button>
                <button onclick="window.navigate('entrada')" id="nav-entrada" class="w-full flex items-center px-6 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="ph ph-box-arrow-down text-lg mr-3"></i> Entrada da Produção
                </button>
                <button onclick="window.navigate('saida')" id="nav-saida" class="w-full flex items-center px-6 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="ph ph-box-arrow-up text-lg mr-3"></i> Saída (PVPS)
                </button>
                <button onclick="window.navigate('estoque')" id="nav-estoque" class="w-full flex items-center px-6 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="ph ph-stack text-lg mr-3"></i> Estoque Atual
                </button>
                <button onclick="window.navigate('inventario')" id="nav-inventario" class="w-full flex items-center px-6 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="ph ph-clipboard-text text-lg mr-3"></i> Inventário Cíclico
                </button>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center justify-between text-sm text-gray-500">
                    <div class="flex items-center overflow-hidden">
                        <i class="ph ph-user-circle text-2xl mr-2"></i>
                        <div class="truncate">
                            <p id="user-name" class="font-bold text-gray-800 truncate">Operador</p>
                            <p class="text-xs">Expedição</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="text-gray-400 hover:text-red-500 ml-2" title="Trocar Operador">
                        <i class="ph ph-sign-out text-lg"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-16 bg-white flex items-center px-8 shadow-sm z-10 shrink-0">
                <h2 id="page-title" class="text-xl font-bold text-gray-800">Painel Inicial</h2>
            </header>

            <div class="flex-1 overflow-y-auto p-8" id="main-container">
                <datalist id="estoque-itens-list"></datalist>

                <div id="view-dashboard" class="space-y-6 block">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold text-gray-500 uppercase">Total na Câmara (kg)</h4>
                                <i class="ph ph-stack text-gray-400 text-xl"></i>
                            </div>
                            <p id="dash-total-items" class="text-2xl font-bold text-gray-800">0</p>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between relative overflow-hidden">
                            <div class="absolute right-0 top-0 w-1.5 h-full bg-yellow-400"></div>
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold text-gray-500 uppercase">Vencendo (< 35d)</h4>
                                <i class="ph ph-warning-circle text-yellow-500 text-xl"></i>
                            </div>
                            <p id="dash-alert-items" class="text-2xl font-bold text-gray-800">0</p>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between relative overflow-hidden">
                            <div class="absolute right-0 top-0 w-1.5 h-full bg-red-500"></div>
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold text-gray-500 uppercase">Bloqueados Vencidos</h4>
                                <i class="ph ph-prohibit text-red-500 text-xl"></i>
                            </div>
                            <p id="dash-blocked-items" class="text-2xl font-bold text-gray-800">0</p>
                        </div>
                    </div>
                </div>

                <div id="view-entrada" class="hidden space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-4xl mx-auto">
                        <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center">
                            <i class="ph ph-plus-circle text-brand-500 mr-2 text-xl"></i> Pesagem de Patinhas (Entrada da Produção)
                        </h3>
                        <form id="form-entrada-item" class="space-y-5">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Produto Programado (Hoje)</label>
                                    <select id="ent-nome" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-800 font-bold focus:outline-none focus:ring-2 focus:ring-brand-400">
                                        <option value="">Carregando produção...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">OP (Winthor)</label>
                                    <input type="text" id="ent-op" readonly class="w-full bg-gray-200 border border-gray-200 rounded-lg px-4 py-3 text-gray-600 font-bold cursor-not-allowed" placeholder="Automático">
                                    <input type="hidden" id="ent-codigo">
                                    <input type="hidden" id="ent-setor-hidden">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Data da Pesagem</label>
                                    <input type="date" id="ent-data" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:bg-white transition-colors">
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Lote Físico</label>
                                    <input type="text" id="ent-lote" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-800 font-bold focus:outline-none focus:ring-2 focus:ring-brand-400" placeholder="Ex: L-0307">
                                </div>
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 text-brand-600">Peso da Patinha</label>
                                    <input type="number" step="0.001" id="ent-qtd" required min="0.001" class="w-full bg-yellow-50 border border-brand-300 rounded-lg px-4 py-3 text-gray-800 font-black text-xl focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="0.000">
                                </div>
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Unidade</label>
                                    <select id="ent-und" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-400">
                                        <option value="kg">Quilograma (kg)</option>
                                        <option value="und">Unidade (und)</option>
                                    </select>
                                </div>
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Validade (Opcional)</label>
                                    <input type="date" id="ent-validade" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-400">
                                </div>
                            </div>

                            <div class="pt-2 text-right">
                                <button type="submit" class="bg-brand-100 border border-brand-300 hover:bg-brand-200 text-brand-800 font-bold py-3 px-8 rounded-lg transition-colors inline-flex items-center text-lg w-full md:w-auto justify-center">
                                    <i class="ph ph-scales mr-2 text-xl"></i> + Pesar Patinha
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-4xl mx-auto hidden" id="box-lista-entrada">
                        <h4 class="font-bold text-gray-800 mb-4 border-b pb-2">Patinhas Pesadas Aguardando Confirmação</h4>
                        <div class="overflow-x-auto mb-6">
                            <table class="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr class="text-gray-500 border-b">
                                        <th class="py-2">Item e OP</th>
                                        <th class="py-2">Lote</th>
                                        <th class="py-2 text-right">Peso</th>
                                        <th class="py-2 text-center">Remover</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-lista-entrada" class="divide-y divide-gray-50"></tbody>
                            </table>
                        </div>
                        <button id="btn-salvar-entradas" class="w-full bg-gray-800 hover:bg-black text-white font-bold py-4 px-4 rounded-lg transition-colors flex justify-center items-center text-lg shadow-md">
                            <i class="ph ph-check-circle mr-2 text-2xl"></i> Dar Entrada na Câmara
                        </button>
                    </div>
                </div>

                </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-[70] flex items-center p-4 text-gray-500 bg-white rounded-2xl shadow-xl border border-gray-100" role="alert">
        <div id="toast-icon" class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 rounded-xl"></div>
        <div id="toast-msg" class="ml-3 text-sm font-medium pr-2 text-gray-700"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, writeBatch, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONECTADO AO BANCO PRINCIPAL RASTREIO-PRODUCAO
        const firebaseConfig = {
            apiKey: "AIzaSyBYriLi3N0Z4ktETeBep8SweiN2rVHRAvs",
            authDomain: "rastreio-producao.firebaseapp.com",
            projectId: "rastreio-producao",
            storageBucket: "rastreio-producao.firebasestorage.app",
            messagingSenderId: "706467121350",
            appId: "1:706467121350:web:5193f6b64d8671b0c1afc7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let estoque = []; let movimentos = []; let producaoHoje = []; let listaEntradaTemporaria = [];
        const hojeISO = new Date().toISOString().split('T')[0];

        window.showToast = function(message, type) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            document.getElementById('toast-icon').innerHTML = type === 'success' ? '<i class="ph ph-check-circle text-green-500 text-2xl"></i>' : '<i class="ph ph-warning text-red-500 text-2xl"></i>';
            t.classList.remove('translate-y-20', 'opacity-0'); setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 4000);
        };

        window.navigate = function(v) { document.getElementById('page-title').innerText = v.toUpperCase(); document.querySelectorAll('[id^=view-]').forEach(el=>el.classList.add('hidden')); document.getElementById('view-'+v)?.classList.remove('hidden'); }

        document.getElementById('btn-logout').addEventListener('click', () => { localStorage.removeItem('nomeOperador'); window.location.reload(); });

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('app-container').classList.remove('hidden');
                let nomeOp = localStorage.getItem('nomeOperador');
                if(!nomeOp) { nomeOp = prompt("Quem está operando a expedição? (Ex: João)"); localStorage.setItem('nomeOperador', nomeOp || 'Expedição'); }
                document.getElementById('user-name').innerText = nomeOp;
                iniciarListenersBanco();
                window.navigate('entrada');
                document.getElementById('ent-data').valueAsDate = new Date();
            } else { signInAnonymously(auth).catch(e => console.error(e)); }
        });

        function iniciarListenersBanco() {
            // Escuta a produção programada para Hoje
            onSnapshot(doc(db, 'producaoDiaria', hojeISO), (snap) => {
                const select = document.getElementById('ent-nome');
                if(snap.exists() && snap.data().itens) {
                    producaoHoje = snap.data().itens;
                    select.innerHTML = '<option value="">Selecione o produto que acabou de chegar...</option>' + 
                        producaoHoje.map((it, i) => `<option value="${i}">${it.produto}</option>`).join('');
                } else {
                    producaoHoje = [];
                    select.innerHTML = '<option value="">Nenhuma produção confirmada pelo líder para hoje.</option>';
                }
            });

            onSnapshot(collection(db, 'estoque'), (snap) => {
                estoque = []; let total = 0;
                snap.forEach(d => { const item = d.data(); estoque.push(item); total += item.qtd; });
                document.getElementById('dash-total-items').innerText = window.fmtQtd(total) + ' kg';
            });
        }

        window.fmtQtd = (val) => Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 3 });

        // Ao escolher o produto, auto-preenche a OP e o código
        document.getElementById('ent-nome').addEventListener('change', function(e) {
            const idx = e.target.value;
            if(idx === '') return;
            const item = producaoHoje[idx];
            document.getElementById('ent-op').value = (item.ops && item.ops.length > 0) ? item.ops.join(', ') : 'Sem OP Vinculada';
            document.getElementById('ent-codigo').value = item.codigo;
            document.getElementById('ent-setor-hidden').value = item.categoria || 'Câmara';
        });

        document.getElementById('form-entrada-item').addEventListener('submit', function(e) {
            e.preventDefault();
            const idx = document.getElementById('ent-nome').value;
            if(idx === '') return window.showToast('Selecione um produto!', 'error');

            const itemProg = producaoHoje[idx];
            listaEntradaTemporaria.push({
                nome: itemProg.produto, codigo: itemProg.codigo, ops: itemProg.ops || [], setor: document.getElementById('ent-setor-hidden').value,
                dataEntrada: document.getElementById('ent-data').value, lote: document.getElementById('ent-lote').value.trim(),
                qtd: parseFloat(document.getElementById('ent-qtd').value), und: document.getElementById('ent-und').value, validade: document.getElementById('ent-validade').value
            });
            renderListaEntrada();
            // Mantém Lote e Produto salvos para as próximas patinhas! Limpa apenas o peso.
            document.getElementById('ent-qtd').value = ''; document.getElementById('ent-qtd').focus();
        });

        window.removerPatinha = (idx) => { listaEntradaTemporaria.splice(idx,1); renderListaEntrada(); }

        function renderListaEntrada() {
            const box = document.getElementById('box-lista-entrada'); const tbody = document.getElementById('tbody-lista-entrada');
            tbody.innerHTML = '';
            if(listaEntradaTemporaria.length === 0) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            listaEntradaTemporaria.forEach((item, index) => {
                tbody.innerHTML += `<tr><td class="py-3 font-bold">${item.nome} <br><span class="text-xs text-gray-400 font-normal">OPs: ${item.ops.join(', ')}</span></td>
                <td class="py-3 font-bold text-brand-600">${item.lote}</td><td class="py-3 text-right font-black text-lg">${window.fmtQtd(item.qtd)} ${item.und}</td>
                <td class="py-3 text-center"><button type="button" onclick="window.removerPatinha(${index})" class="text-red-500 hover:text-red-700 p-2"><i class="ph ph-trash text-xl"></i></button></td></tr>`;
            });
        }

        document.getElementById('btn-salvar-entradas').addEventListener('click', async () => {
            if(listaEntradaTemporaria.length === 0) return;
            const btn = document.getElementById('btn-salvar-entradas'); btn.disabled = true; btn.innerHTML = 'Salvando...';

            try {
                const batch = writeBatch(db); const timestamp = new Date().toISOString();
                const nomeOp = localStorage.getItem('nomeOperador');

                listaEntradaTemporaria.forEach(item => {
                    // 1. Grava no Estoque (Gestão interna da câmara)
                    batch.set(doc(collection(db, 'estoque')), { nome: item.nome, setor: item.setor, lote: item.lote, qtd: item.qtd, und: item.und, validade: item.validade, dataEntrada: item.dataEntrada, isTeste: false });
                    
                    // 2. Grava no Histórico de Movimentações
                    batch.set(doc(collection(db, 'movimentos')), { tipo: 'ENTRADA', nome: item.nome, lote: item.lote, qtd: item.qtd, und: item.und, data: timestamp, usuario: nomeOp });

                    // 3. INTEGRAÇÃO CRÍTICA: Envia para a expedicaoDiaria (Avisa a TV e o PCP em Tempo Real no App Principal)
                    const regExp = { id: Date.now().toString()+Math.random(), codigoProduto: item.codigo, produto: item.nome, ops: item.ops, lote: item.lote, peso: item.qtd, horario: timestamp };
                    batch.set(doc(db, 'expedicaoDiaria', hojeISO), { data: hojeISO, registros: arrayUnion(regExp) }, { merge: true });
                });

                await batch.commit();
                window.showToast(`${listaEntradaTemporaria.length} patinhas registradas e comunicadas à TV!`, 'success');
                listaEntradaTemporaria = []; renderListaEntrada(); document.getElementById('ent-qtd').focus();
            } catch(e) { window.showToast(e.message, 'error'); } finally { btn.disabled = false; btn.innerHTML = 'Dar Entrada na Câmara'; }
        });
    </script>
</body>
</html>
